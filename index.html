<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry...</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            transition: all 0.5s ease;
            position: relative;
        }
        .sad-emoji {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 {
            color: #ff4d6d;
            font-size: 2rem;
            margin-bottom: 15px;
        }
        p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            position: relative;
            min-height: 60px;
        }
        button {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #yesBtn {
            background-color: #2ec4b6;
            color: white;
            box-shadow: 0 4px 15px rgba(46, 196, 182, 0.3);
        }
        #yesBtn:hover {
            transform: scale(1.05);
            background-color: #25a195;
        }
        #noBtn {
            background-color: #ff4d6d;
            color: white;
            position: relative;
            z-index: 10;
        }
        .hidden {
            display: none !important;
        }
        .celebration-hearts {
            font-size: 50px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container" id="card">
        <!-- Main Apology Screen -->
        <div id="apologyScreen">
            <div class="sad-emoji" id="emoji">🥺</div>
            <h1 id="heading">I'm sorry Tuba...</h1>
            <p id="message">I really messed up and I feel terrible about it</p>
            <div class="btn-group">
                <button id="yesBtn" onclick="acceptApology()">Yes</button>
                <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
            </div>
        </div>

        <!-- Success Screen -->
        <div id="successScreen" class="hidden">
            <div class="sad-emoji">🥰</div>
            <h1>Thank You ! </h1>
            <p>Hmm</p>
            <div class="celebration-hearts">🎈✨🎉</div>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const heading = document.getElementById('heading');
        const message = document.getElementById('message');
        const emoji = document.getElementById('emoji');
        
        let clickCount = 0;

        // Custom alternative responses as they try to click "No"
        const excuses = [
            "Wait, think about it! 😢",
            "Please? I'll buy you food! 🍕",
            "Are you absolutely sure? 💔",
        ];

        function moveButton() {
            // Pick a message based on how many times they tried to click 'No'
            if (clickCount < excuses.length) {
                heading.innerText = "Please? 🥺";
                message.innerText = excuses[clickCount];
                emoji.innerText = "😭";
            }

            // Make the 'Yes' button progressively bigger and more tempting
            let currentScale = 1 + (clickCount * 0.15);
            yesBtn.style.transform = `scale(${currentScale})`;
            
            // Teleport the 'No' button randomly within the card area
            const padding = 20;
            const card = document.getElementById('card');
            
            // Calculate boundaries relative to the container
            const maxX = card.clientWidth - noBtn.clientWidth - padding;
            const maxY = card.clientHeight - noBtn.clientHeight - padding;
            
            // Ensure values don't go negative
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            
            clickCount++;
        }

        function acceptApology() {
            document.getElementById('apologyScreen').classList.add('hidden');
            document.getElementById('successScreen').classList.remove('hidden');
        }
    </script>
</body>
</html>
